<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Insights+ Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chess.js@1.0.0-beta.6/dist/chess.min.js"></script>
  <style>
    :root { --bg:#0f1220; --panel:#171b2e; --text:#e8ebff; --muted:#9ba6d8; --accent:#6ea8ff; --good:#5bd18b; --bad:#ff7c8f; }
    body { margin:0; font-family:Inter,system-ui,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1250px; margin:0 auto; padding:1rem; }
    .toolbar { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    input,button,select { padding:.55rem .7rem; border-radius:.5rem; border:1px solid #2a3360; background:#11172d; color:var(--text); }
    button{ cursor:pointer; background:#233265; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:.75rem; margin-bottom:1rem; }
    .card { background:var(--panel); border:1px solid #262f56; border-radius:.8rem; padding:.8rem; }
    .k { color:var(--muted); font-size:.85rem; } .v { font-size:1.5rem; font-weight:700; }
    .charts { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:1rem; }
    canvas { background:var(--panel); border:1px solid #262f56; border-radius:.8rem; padding:.5rem; }
    .sub { color:var(--muted); }
    .two-col{display:grid;grid-template-columns:1fr 1.2fr;gap:1rem}
    .game-row{display:grid;grid-template-columns:110px 70px 1fr 60px;gap:.5rem;width:100%;text-align:left;margin:.2rem 0;background:#11172d}
    .win{color:var(--good)} .loss{color:var(--bad)} .draw{color:#ddd}
    table { width:100%; border-collapse:collapse; font-size:.92rem; }
    th,td { border-bottom:1px solid #2b345f; padding:.4rem; text-align:left; }
    #evalStatus{margin-left:.5rem}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Chess Insights+ Dashboard</h1>
    <p class="sub">Tracks public games for a Chess.com username with move-by-move engine evaluation.</p>
    <div class="toolbar">
      <input id="username" value="jst28323" />
      <select id="rangeFilter"><option value="all">All time</option><option value="24h">Last 24 hours</option><option value="7d">Last week</option><option value="30d">Last month</option><option value="90d">Last 90 days</option></select>
      <button id="loadBtn">Load Dashboard</button>
      <span id="status" class="sub"></span>
    </div>
    <div class="grid" id="kpis"></div>
    <div class="charts"><canvas id="ratingChart"></canvas><canvas id="volumeChart"></canvas><canvas id="resultChart"></canvas><canvas id="oppRatingChart"></canvas></div>
    <h3>By Time Control</h3><div class="card"><table id="timeControlTable"></table></div>
    <h3>Game Feed <span id="feedCount" class="sub"></span></h3>
    <div class="two-col">
      <div class="card" id="gamesFeed"></div>
      <div class="card" id="gameDetails"><div class="sub">Click any game to run full move-by-move engine eval and graph.</div></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
